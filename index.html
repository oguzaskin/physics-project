<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eğik Atış Laboratuvarı</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

/* SAYFA GEÇİŞ */
.page { display: none; padding: 20px; }
.active { display: block; }

/* BUTON */
button {
    padding: 10px 15px;
    margin: 6px;
    border: none;
    border-radius: 10px;
    background: #2563eb;
    color: white;
    cursor: pointer;
}
button:hover { background: #1d4ed8; }

/* CANVAS */
canvas {
    background: #111827;
    border-radius: 10px;
    margin-top: 15px;
}

/* VIDEO */
video {
    margin-top: 15px;
    border-radius: 10px;
}

/* CETVEL */
.ruler {
    position: relative;
    width: 600px;
    height: 30px;
    margin: 10px auto;
    border-top: 2px solid white;
}
.tick {
    position: absolute;
    top: -10px;
    font-size: 10px;
}
</style>
</head>

<body>

<!-- ================= ANA SAYFA ================= -->
<div id="home" class="page active">

<h1>🎯 Eğik Atış Laboratuvarı</h1>

<p>
Bu projede eğik atış hareketi incelenir.  
Farklı açılarda cisimlerin hareketi gözlemlenir.
</p>

<button onclick="sayfa('sim')">🚀 Başla</button>

</div>

<!-- ================= SİMÜLASYON ================= -->
<div id="sim" class="page">

<h2>🎮 Simülasyon</h2>

<!-- VIDEO SEÇİM -->
<h3>🎥 Videolar</h3>
<button onclick="videoDegistir('25.mp4')">25°</button>
<button onclick="videoDegistir('30.mp4')">30°</button>
<button onclick="videoDegistir('45.mp4')">45°</button>
<button onclick="videoDegistir('60.mp4')">60°</button>

<br>

<video id="video" width="500" controls>
<source id="source" src="25.mp4">
</video>

<hr>

<!-- KONTROL -->
<h3>🎯 Simülasyon</h3>
<input id="angle" type="number" placeholder="Açı">
<input id="speed" type="number" placeholder="Hız">
<button onclick="baslat()">Başlat</button>

<!-- CETVEL -->
<div class="ruler" id="ruler"></div>

<canvas id="canvas" width="700" height="400"></canvas>

<br>
<button onclick="sayfa('home')">⬅ Geri</button>

</div>

<script>

function sayfa(id){
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* VIDEO */
function videoDegistir(file){
    document.getElementById("source").src = file;
    let v = document.getElementById("video");
    v.load();
    v.play();
}

/* CETVEL OLUŞTUR */
let ruler = document.getElementById("ruler");
for(let i=0;i<=10;i++){
    let tick = document.createElement("div");
    tick.className = "tick";
    tick.style.left = (i*10*6) + "px";
    tick.innerHTML = i*10;
    ruler.appendChild(tick);
}

/* FİZİK */
let trail = [];

function draw() {
    ctx.clearRect(0, 0, 900, 500);

    // yer çizgisi
    ctx.fillStyle = "white";
    ctx.fillRect(0, 460, 900, 2);

    // konum hesaplama
    x = 50 + vx * t * 5;
    y = 450 - (vy * t * 5 - 0.5 * 9.8 * t * t * 5);

    // 🔥 iz ekleme
    trail.push({x: x, y: y});

    // eski izleri çiz
    for (let i = 0; i < trail.length; i++) {
        let p = trail[i];

        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);

        // eski izler daha soluk
        ctx.fillStyle = "rgba(255, 0, 0, " + (i / trail.length) + ")";
        ctx.fill();
    }

    // ana cisim
    ctx.beginPath();
    ctx.arc(x, y, 8, 0, Math.PI * 2);
    ctx.fillStyle = "red";
    ctx.fill();

    t += 0.02;

    // iz uzunluğu kontrol (performans için)
    if (trail.length > 80) trail.shift();

    if (y < 460) {
        anim = requestAnimationFrame(draw);
    }
}

    draw();
}

</script>

</body>
</html>
