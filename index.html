<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Gerçek Eğik Atış Simülasyonu</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

canvas {
    background: #111827;
    margin-top: 20px;
    border-radius: 10px;
}

input {
    padding: 8px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    width: 120px;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: #2563eb;
    color: white;
    cursor: pointer;
}
button:hover {
    background: #1d4ed8;
}
</style>

</head>

<body>

<h1>🎯 Gerçek Eğik Atış Simülasyonu</h1>

<p>Açı ve hız gir → hareketi izle</p>

<input id="angle" type="number" placeholder="Açı (°)">
<input id="speed" type="number" placeholder="Hız (m/s)">
<button onclick="baslat()">Başlat</button>

<canvas id="canvas" width="900" height="500"></canvas>

<script>

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let x = 50;
let y = 450;

let t = 0;
let anim;

function baslat() {
    cancelAnimationFrame(anim);

    x = 50;
    y = 450;
    t = 0;

    let angle = document.getElementById("angle").value;
    let v = document.getElementById("speed").value;

    let rad = angle * Math.PI / 180;

    let vx = v * Math.cos(rad);
    let vy = v * Math.sin(rad);

    function draw() {
        ctx.clearRect(0, 0, 900, 500);

        // yer
        ctx.fillStyle = "white";
        ctx.fillRect(0, 460, 900, 2);

        // hareket denklemi
        x = 50 + vx * t * 5;
        y = 450 - (vy * t * 5 - 0.5 * 9.8 * t * t * 5);

        ctx.beginPath();
        ctx.arc(x, y, 8, 0, Math.PI * 2);
        ctx.fillStyle = "red";
        ctx.fill();

        t += 0.02;

        if (y < 460) {
            anim = requestAnimationFrame(draw);
        }
    }

    draw();
}

</script>

</body>
</html>
