<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eğik Atış Simülasyonu</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

h1 { margin-top: 10px; }

input {
    padding: 8px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    width: 120px;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: #2563eb;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

canvas {
    background: #111827;
    margin-top: 20px;
    border-radius: 10px;
}
</style>

</head>

<body>

<h1>🎯 Eğik Atış Simülasyonu</h1>

<p>Açı ve hız gir → hareketi izle</p>

<input id="angle" type="number" placeholder="Açı (°)">
<input id="speed" type="number" placeholder="Hız (m/s)">
<button onclick="baslat()">Başlat</button>

<canvas id="canvas" width="900" height="500"></canvas>

<script>

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let t = 0;
let anim;
let trail = [];

function baslat() {

    cancelAnimationFrame(anim);

    t = 0;
    trail = [];

    // default güvenli değerler
    let angle = Number(document.getElementById("angle").value || 45);
    let speed = Number(document.getElementById("speed").value || 25);

    let rad = angle * Math.PI / 180;

    let vx = speed * Math.cos(rad);
    let vy = speed * Math.sin(rad);

    function draw() {

        ctx.clearRect(0, 0, 900, 500);

        // ZEMİN
        ctx.fillStyle = "white";
        ctx.fillRect(100, 420, 700, 4);

        // FİZİK
        let x = 100 + vx * t * 5;
        let y = 420 - (vy * t * 5 - 0.5 * 9.8 * t * t * 5);

        // yere sabitle
        if (y >= 420) y = 420;

        // TRAIL EKLE
        trail.push({ x, y });

        // TRAIL ÇİZ
        for (let i = 0; i < trail.length; i++) {
            ctx.beginPath();
            ctx.arc(trail[i].x, trail[i].y, 4, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255,0,0," + (i / trail.length) + ")";
            ctx.fill();
        }

        // ANA CİSİM
        ctx.beginPath();
        ctx.arc(x, y, 7, 0, Math.PI * 2);
        ctx.fillStyle = "red";
        ctx.fill();

        // trail limit
        if (trail.length > 100) trail.shift();

        t += 0.02;

        // DURMA
        if (y < 420) {
            anim = requestAnimationFrame(draw);
        }
    }

    draw();
}

</script>

</body>
</html>
