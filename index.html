<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eğik Atış Simülasyonu</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
}

h1 { margin-top: 15px; }

button {
    margin: 5px;
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: #2563eb;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

iframe, video {
    margin-top: 20px;
    border-radius: 12px;
}

input {
    padding: 8px;
    border-radius: 8px;
    border: none;
    margin-top: 10px;
    width: 100px;
}
</style>

</head>

<body>

<h1>🎯 Eğik Atış Simülasyonu</h1>

<p>Hazır videolar + canlı simülasyon</p>

<!-- BUTONLAR -->
<div>
    <button onclick="videoDegistir('25.mp4')">25°</button>
    <button onclick="videoDegistir('30.mp4')">30°</button>
    <button onclick="videoDegistir('45.mp4')">45°</button>
    <button onclick="videoDegistir('60.mp4')">60°</button>
</div>

<!-- VIDEO -->
<video id="video" width="600" controls>
    <source id="source" src="25.mp4" type="video/mp4">
</video>

<hr>

<!-- KULLANICI AÇI GİRİŞİ -->
<h3>Kendi açını dene</h3>
<input type="number" id="aci" placeholder="Açı gir">
<button onclick="simAc()">Simülasyonu Aç</button>

<!-- PHET SIM -->
<iframe id="sim"
    src="https://phet.colorado.edu/sims/html/projectile-motion/latest/projectile-motion_tr.html"
    width="800"
    height="600"
    allowfullscreen>
</iframe>

<script>

// VIDEO DEĞİŞTİRME
function videoDegistir(dosya) {
    let video = document.getElementById("video");
    let source = document.getElementById("source");

    source.src = dosya;
    video.load();
    video.play();
}

// PHET AÇI GİRİŞİ
function simAc() {
    let aci = document.getElementById("aci").value;

    if (!aci) return;

    let iframe = document.getElementById("sim");

    // bazı simler parametre kabul etmez ama URL ile deneme yapılır
    iframe.src = "https://phet.colorado.edu/sims/html/projectile-motion/latest/projectile-motion_tr.html";
}

</script>

</body>
</html>
