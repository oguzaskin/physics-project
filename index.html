<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eğik Atış Simülasyonu</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
}

/* Başlık */
h1 {
    margin-top: 20px;
    font-size: 28px;
}

/* Buton alanı */
.buttons {
    margin: 20px;
}

/* Modern buton */
button {
    background: #2563eb;
    border: none;
    padding: 12px 20px;
    margin: 8px;
    border-radius: 10px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

button:hover {
    background: #1d4ed8;
    transform: scale(1.1);
}

/* Video */
.video-container {
    margin-top: 20px;
}

video {
    width: 80%;
    max-width: 700px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    opacity: 1;
    transition: opacity 0.5s ease;
}

/* Fade efekti */
.fade {
    opacity: 0;
}
</style>

</head>

<body>

<h1> Eğik Atış Simülasyonu</h1>

<p>Farklı açılarla atılan cisimlerin hareketini incele</p>

<div class="buttons">
    <button onclick="videoDegistir('25.mp4')">25°’lik Açı ile Atış</button>
<button onclick="videoDegistir('30.mp4')">30°’lik Açı ile Atış</button>
<button onclick="videoDegistir('45.mp4')">45°’lik Açı ile Atış</button>
<button onclick="videoDegistir('60.mp4')">60°’lik Açı ile Atış</button>
</div>

<div class="video-container">
    <video id="video" controls>
        <source src="25.mp4" type="video/mp4">
    </video>
</div>

<script>
function degistir(dosya) {
    let video = document.getElementById("video");

    // fade-out
    video.classList.add("fade");

    setTimeout(() => {
        video.src = dosya;
        video.load();
        video.play();

        // fade-in
        video.classList.remove("fade");
    }, 300);
}
</script>

</body>
</html>
