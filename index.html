<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eğik Atış Laboratuvarı</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.page { display: none; padding: 20px; }
.active { display: block; }

button {
    padding: 10px 15px;
    margin: 6px;
    border: none;
    border-radius: 10px;
    background: #2563eb;
    color: white;
    cursor: pointer;
}
button:hover { background: #1d4ed8; }

canvas {
    background: #111827;
    border-radius: 10px;
    margin-top: 15px;
}

.text-box {
    max-width: 800px;
    margin: auto;
    line-height: 1.6;
    text-align: left;
}
</style>
</head>

<body>

<!-- ANA SAYFA -->
<div id="home" class="page active">

<h1>🎯 Eğik Atış Laboratuvarı</h1>

<button onclick="sayfa('konu')">📘 Konu Anlatımı</button>
<button onclick="sayfa('sim')">🎮 Kendin Dene</button>

</div>

<!-- KONU -->
<div id="konu" class="page">

<h2>📘 Konu Anlatımı</h2>

<div class="text-box">
<p>
Fizikte Eğik Atış Hareketi, bir cismin yatayla belirli bir açı yapacak şekilde fırlatılması sonucu oluşan iki boyutlu bir harekettir.
</p>
</div>

<button onclick="sayfa('home')">⬅ Geri</button>
</div>

<!-- SİMÜLASYON -->
<div id="sim" class="page">

<h2>🎮 Simülasyon</h2>

<input id="angle" type="number" placeholder="Açı (°)">
<input id="speed" type="number" placeholder="Hız (m/s)">
<button onclick="baslat()">Başlat</button>

<br>

<canvas id="canvas" width="1000" height="400"></canvas>

<br>
<button onclick="sayfa('home')">⬅ Geri</button>

</div>

<script>

/* SAYFA */
function sayfa(id){
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* CANVAS */
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let t = 0;
let anim;
let trail = [];

/* SİMÜLASYON */
function baslat(){

    cancelAnimationFrame(anim);

    t = 0;
    trail = [];

    let angle = parseFloat(document.getElementById("angle").value);
    let speed = parseFloat(document.getElementById("speed").value);

    if (isNaN(angle) || isNaN(speed)) {
        alert("Açı ve hız gir!");
        return;
    }

    let rad = angle * Math.PI / 180;

    let vx = speed * Math.cos(rad);
    let vy = speed * Math.sin(rad);

    let g = 9.8;

    /* ölçek */
    let scale = Math.max(2, 500 / speed);

    /* 📊 MENZİL + MAX YÜKSEKLİK */
    let range = (speed * speed * Math.sin(2 * rad)) / g;
    let maxHeight = (speed * speed * Math.sin(rad) * Math.sin(rad)) / (2 * g);

    let lastTime = 0;

    function draw(time){

        if(!lastTime) lastTime = time;

        let dt = (time - lastTime)/1000;
        lastTime = time;

        t += dt;

        ctx.clearRect(0,0,1000,400);

        /* 🌍 ZEMİN */
        ctx.fillStyle = "white";
        ctx.fillRect(50,350,900,4);

        /* 📏 METRE */
        ctx.fillStyle = "white";
        ctx.font = "10px Arial";

        for(let m = 0; m <= 200; m += 10){
            let xPos = 50 + m * scale;
            ctx.fillRect(xPos, 345, 2, 10);
            ctx.fillText(m + " m", xPos - 10, 340);
        }

        /* 🚀 hareket */
        let x = 50 + vx * t * scale;
        let y = 350 - (vy * t * scale - 0.5 * g * t * t * scale);

        trail.push({x,y});

        /* iz */
        for(let i=0;i<trail.length;i++){
            ctx.beginPath();
            ctx.arc(trail[i].x, trail[i].y, 3, 0, Math.PI*2);
            ctx.fillStyle = "rgba(255,0,0,"+(i/trail.length)+")";
            ctx.fill();
        }

        /* cisim */
        ctx.beginPath();
        ctx.arc(x,y,6,0,Math.PI*2);
        ctx.fillStyle="red";
        ctx.fill();

        /* 📊 BİLGİLER */
        ctx.fillStyle = "white";
        ctx.fillText("Zaman: " + t.toFixed(2) + " s", 10, 20);
        ctx.fillText("Menzil: " + range.toFixed(2) + " m", 10, 40);
        ctx.fillText("Max Yükseklik: " + maxHeight.toFixed(2) + " m", 10, 60);

        if(trail.length > 150) trail.shift();

        if(y <= 350 && x <= 950){
            anim = requestAnimationFrame(draw);
        }
    }

    anim = requestAnimationFrame(draw);
}

</script>

</body>
</html>
