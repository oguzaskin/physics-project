<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eğik Atış Laboratuvarı</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.page { display: none; padding: 20px; }
.active { display: block; }

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    background: #2563eb;
    color: white;
    cursor: pointer;
}
button:hover { background: #1d4ed8; }

canvas {
    background: #111827;
    border-radius: 10px;
    margin-top: 10px;
}

video {
    margin-top: 10px;
    border-radius: 10px;
}

input {
    padding: 8px;
    margin: 5px;
    width: 120px;
    border-radius: 8px;
    border: none;
}

/* CETVEL */
.ruler {
    position: relative;
    width: 600px;
    height: 30px;
    margin: 10px auto;
    border-top: 2px solid white;
}
.tick {
    position: absolute;
    top: -10px;
    font-size: 10px;
}
</style>
</head>

<body>

<!-- 🏠 ANA SAYFA -->
<div id="home" class="page active">
<h1>Yatay Atış Hareketi Simülasyonu</h1>

<p>Farklı açılarla eğik atış hareketi incelenir</p>

<button onclick="go('sim')">🚀 Başla</button>
</div>

<!-- 🎮 SİMÜLASYON -->
<div id="sim" class="page">

<h2>Simülasyon + Videolar</h2>

<!-- 🎥 VİDEO -->
<h3>Video Seç</h3>
<button onclick="video('25.mp4')">25°</button>
<button onclick="video('30.mp4')">30°</button>
<button onclick="video('45.mp4')">45°</button>
<button onclick="video('60.mp4')">60°</button>

<br>

<video id="vid" width="500" controls>
<source id="src" src="25.mp4">
</video>

<hr>

<!-- 🎯 FİZİK -->
<h3>Simülasyon</h3>
<input id="angle" placeholder="Açı">
<input id="speed" placeholder="Hız">
<button onclick="start()">Başlat</button>

<!-- 📏 CETVEL -->
<div class="ruler" id="ruler"></div>

<canvas id="canvas" width="700" height="400"></canvas>

<br>
<button onclick="go('home')">⬅ Geri</button>

</div>

<script>

/* SAYFA */
function go(id){
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* VIDEO */
function video(file){
    document.getElementById("src").src = file;
    let v = document.getElementById("vid");
    v.load();
    v.play();
}

/* CETVEL */
let ruler = document.getElementById("ruler");
for(let i=0;i<=10;i++){
    let tick = document.createElement("div");
    tick.className = "tick";
    tick.style.left = (i*60) + "px";
    tick.innerHTML = i*10;
    ruler.appendChild(tick);
}

/* CANVAS */
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let t = 0;
let trail = [];
let anim;

function start(){

    cancelAnimationFrame(anim);

    t = 0;
    trail = [];

    // ✔ güvenli değer alma
    let angle = Number(document.getElementById("angle").value);
    let speed = Number(document.getElementById("speed").value);

    // ✔ boşsa varsayılan değer
    if (!angle) angle = 45;
    if (!speed) speed = 20;

    let rad = angle * Math.PI / 180;

    let vx = speed * Math.cos(rad);
    let vy = speed * Math.sin(rad);

    function draw(){

        ctx.clearRect(0,0,700,400);

        // zemin
        ctx.fillStyle = "white";
        ctx.fillRect(100,350,500,4);

        // fizik
        let x = 100 + vx*t*5;
        let y = 350 - (vy*t*5 - 0.5*9.8*t*t*5);

        // yere çarpınca sabitle
        if(y >= 350){
            y = 350;
        }

        // trail
        trail.push({x,y});

        for(let i=0;i<trail.length;i++){
            ctx.beginPath();
            ctx.arc(trail[i].x, trail[i].y, 3, 0, Math.PI*2);
            ctx.fillStyle = "rgba(255,0,0,"+(i/trail.length)+")";
            ctx.fill();
        }

        // top
        ctx.beginPath();
        ctx.arc(x,y,6,0,Math.PI*2);
        ctx.fillStyle="red";
        ctx.fill();

        if(trail.length > 80) trail.shift();

        t += 0.02;

        if(y < 350){
            anim = requestAnimationFrame(draw);
        }
    }

    draw();
}

</script>

</body>
</html>
